<!DOCTYPE html>
<html>
<head>
    <title>Edit Grades</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>{{ student[1] }}</h1>
        <p>ID: {{ student[0] }}</p>
    </div>
    <div class="card">
        <h2>Add / Edit Grade</h2>
        <form method="POST">
            <br><br>
            <input
                type="number"
                name="test"
                placeholder="Test"
                required>
            <br><br>
            <input
                type="number"
                name="assignment"
                placeholder="Assignment"
                required>
            <br><br>
            <input
                type="number"
                name="final_exam"
                placeholder="Final Exam"
                required>
            <br><br>
            <button type="submit">
                Save Grade
            </button>
        </form>
    </div>
    <div class="card">
        <h2>Current Grades</h2>
        <table>
            <tr>
                <th>Subject</th>
                <th>Test</th>
                <th>Assignment</th>
                <th>Final</th>
            </tr>
            {% for g in grades %}
            <tr>
                <td>{{ g[0] }}</td>
                <td>{{ g[1] }}</td>
                <td>{{ g[2] }}</td>
                <td>{{ g[3] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
</body>
</html>
