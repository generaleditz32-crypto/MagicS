<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Magic Carpet School: Registration Page</title>
        <link rel="stylesheet" href="../static/css/style.css">
        <link rel="stylesheet" href="../static/css/Loginform.css">
    </head>
    <body>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="popup {{ category }}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <nav class="navbar">
            <a href="{{ url_for('home') }}" class="logo"><img src="../static/images/School logo.png" class="logoimg"></a>
            <section class="navtags">
                <a href="{{ url_for('home') }}" class="navtext">Home</a>
                <a href="{{ url_for('about') }}" class="navtext">About us</a>
                <a href="{{ url_for('courses') }}" class="navtext">Courses</a>
                <a href="{{ url_for('history') }}" class="navtext">History</a>
                <a href="{{ url_for('contact') }}" class="navtext">Contact</a>
                <a href="/login" class="navtext">Login</a>
                <a href="{{ url_for('registration') }}" class="navtext">Register</a>
            </section>
        </nav>

        <section class="section">
            <form class="register-form" method="POST" action="/submit_application" enctype="multipart/form-data">
                <h1 class="reg-title">Registration</h1>
                <div class="form-group">
                    <label>Full Name(including grandparents)</label>
                    <input type="text" name="full_name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" name="birth_date" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label class="sexlabel">Male<input type="radio" name="gender" id="male" value="Male" required></label>
                        <label class="sexlabel">Female<input type="radio" name="gender" id="female" value="Female" required></label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Parent / Guardian Name</label>
                    <input type="text" name="parent_name" required>
                </div>

                <div class="form-group">
                    <label>Grade Applying For</label>

                    <select name="grade" id="grade" class="dropdown">
                        <option>Nursery</option>
                        <option>LKG</option>
                        <option>UKG</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                        <option>11</option>
                        <option>12</option>
                    </select>
                </div>

                <div class="form-group" id="stream-group">
                    <label>Stream</label>

                    <select name="stream" class="dropdown">
                        <option>Natural</option>
                        <option>Social</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Previous School</label>
                    <input type="text" name="previous_school" placeholder="School name" required>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" name="address" placeholder="Location" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="abc123@gmail.com">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" placeholder="+251..." required>
                </div>

                <div class="form-group">
                    <label>Parent / Guardian Phone</label>
                    <input type="tel" name="parent_phone" required>
                </div>

                <div class="form-group">
                    <label>Transcript</label>
                    <input type="file" name="transcript_file" accept=".pdf,.jpg,.jpeg,.png" required>
                </div>

                <div class="form-group">
                    <label>Additional Documents</label>
                    <input type="file" name="document_file" accept=".pdf,.jpg,.jpeg,.png">
                </div>

                <div class="button-group">
                    <button type="submit" class="button">Submit</button>
                </div>

            </form>
        </section>

        <script>
        const grade = document.getElementById("grade");
        const streamGroup = document.getElementById("stream-group");
        function toggleStream() {
            if (grade.value === "11" || grade.value === "12") {
                streamGroup.style.display = "block";
            } else {
                streamGroup.style.display = "none";
            }
        }
        toggleStream();
        grade.addEventListener("change", toggleStream);
        </script>
    </body>
</html>
