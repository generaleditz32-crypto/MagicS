<!DOCTYPE html>
<html>
<head>
    <title>Edit Announcement</title>
    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/dashboard.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Edit Announcement</h1>

        <form method="POST">

            <input
                type="text"
                name="title"
                value="{{ announcement[1] }}"
                required>

            <br><br>

            <textarea
                name="message"
                rows="8"
                required>{{ announcement[2] }}</textarea>

            <br><br>

            <button type="submit">
                Save Changes
            </button>

        </form>

    </div>

</div>

</body>
</html>
